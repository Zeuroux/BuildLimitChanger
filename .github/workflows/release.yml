name: Release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NDK_VERSION: 30.0.14904198

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: linux-release
            os: ubuntu-latest
            name: Linux x86_64
            archName: linux-x86_64
            binaryDir: build/linux
            artifactGlob: build/linux/*.so

          - preset: android-arm64-release
            os: ubuntu-latest
            name: Android arm64
            archName: android-arm64
            binaryDir: build/android-arm64
            artifactGlob: build/android-arm64/*.so

          - preset: android-x86_64-release
            os: ubuntu-latest
            name: Android x86_64
            archName: android-x86_64
            binaryDir: build/android-x86_64
            artifactGlob: build/android-x86_64/*.so

          - preset: windows-release
            os: windows-latest
            name: Windows MSVC x64
            archName: windows-x64
            binaryDir: build/windows
            artifactGlob: build/windows/*.dll

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress

      - name: Set up MSVC environment
        if: matrix.preset == 'windows-release'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Android SDK
        if: startsWith(matrix.preset, 'android-')
        uses: android-actions/setup-android@v3

      - name: Install specific NDK version
        if: startsWith(matrix.preset, 'android-')
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Export NDK_HOME
        if: startsWith(matrix.preset, 'android-')
        run: echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build ${{ matrix.binaryDir }} --config Release

      - name: Rename artifacts
        shell: bash
        run: |
          for f in ${{ matrix.artifactGlob }}; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            name="${base%.*}"
            ext="${base##*.}"
            mv "$f" "$dir/${{ matrix.archName }}-${name}.${ext}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}
          path: ${{ matrix.artifactGlob }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: artifacts/**/*
          fail_on_unmatched_files: true